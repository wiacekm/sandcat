name: Tests

on:
  push:
    branches: [master]
    paths:
      - 'cli/templates/devcontainer/sandcat/scripts/**'
      - 'cli/test/mitmproxy/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'cli/templates/devcontainer/sandcat/scripts/**'
      - 'cli/test/mitmproxy/**'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: pytest cli/test/mitmproxy/test_mitmproxy_addon.py -v
